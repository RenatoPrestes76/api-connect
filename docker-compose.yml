services:
  postgres:
    image: postgres:16-alpine
    container_name: seltriva_postgres
    environment:
      POSTGRES_USER: seltriva
      POSTGRES_PASSWORD: seltriva_dev_password
      POSTGRES_DB: seltriva_connect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seltriva']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seltriva

  redis:
    image: redis:7-alpine
    container_name: seltriva_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seltriva

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: seltriva_api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://seltriva:seltriva_dev_password@postgres:5432/seltriva_connect
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      API_SECRET_KEY: dev_secret_key_change_in_production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seltriva
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages

volumes:
  postgres_data:

networks:
  seltriva:
    driver: bridge
