services:
  erp-postgres:
    image: postgres:15-alpine
    container_name: atlas-erp-postgres
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
      POSTGRES_DB: erp_seltriva
    ports:
      - '5435:5432'
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_user -d erp_seltriva']
      interval: 5s
      timeout: 5s
      retries: 12
