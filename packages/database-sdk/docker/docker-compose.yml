services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d testdb']
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'testuser', '-ptestpass']
      interval: 5s
      timeout: 5s
      retries: 15

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: testpass
    command: >
      psql -h postgres -U testuser -d testdb -c "
        CREATE TABLE IF NOT EXISTS users (
          id    SERIAL PRIMARY KEY,
          email VARCHAR(255) NOT NULL UNIQUE,
          name  VARCHAR(255)
        );
        CREATE TABLE IF NOT EXISTS orders (
          id      SERIAL PRIMARY KEY,
          user_id INTEGER NOT NULL REFERENCES users(id),
          total   NUMERIC(10,2) NOT NULL
        );
        INSERT INTO users  (email, name)   VALUES ('alice@example.com', 'Alice') ON CONFLICT DO NOTHING;
        INSERT INTO users  (email, name)   VALUES ('bob@example.com',   'Bob')   ON CONFLICT DO NOTHING;
        INSERT INTO orders (user_id, total) VALUES (1, 99.99)                    ON CONFLICT DO NOTHING;
      "

  mysql-init:
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      mysql -h mysql -u testuser -ptestpass testdb -e "
        CREATE TABLE IF NOT EXISTS users (
          id    INT AUTO_INCREMENT PRIMARY KEY,
          email VARCHAR(255) NOT NULL UNIQUE,
          name  VARCHAR(255)
        );
        CREATE TABLE IF NOT EXISTS orders (
          id      INT AUTO_INCREMENT PRIMARY KEY,
          user_id INT NOT NULL,
          total   DECIMAL(10,2) NOT NULL,
          FOREIGN KEY (user_id) REFERENCES users(id)
        );
        INSERT IGNORE INTO users  (email, name)   VALUES ('alice@example.com', 'Alice');
        INSERT IGNORE INTO users  (email, name)   VALUES ('bob@example.com', 'Bob');
        INSERT IGNORE INTO orders (user_id, total) VALUES (1, 99.99);
      "
