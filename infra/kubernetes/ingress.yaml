apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress
  namespace: atlas-connect
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/use-regex: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '10m'
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '10'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    nginx.ingress.kubernetes.io/cors-allow-origin: 'https://app.atlas-connect.io'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.atlas-connect.io
        - app.atlas-connect.io
      secretName: atlas-tls
  rules:
    - host: api.atlas-connect.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-api-service
                port:
                  number: 3001
    - host: app.atlas-connect.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-web-service
                port:
                  number: 3000
