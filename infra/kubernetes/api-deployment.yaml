apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-api
  namespace: atlas-connect
  labels:
    app: atlas-api
    component: backend
    sprint: '36'
spec:
  replicas: 3
  selector:
    matchLabels:
      app: atlas-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: atlas-api
        component: backend
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3001'
        prometheus.io/path: '/metrics'
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [atlas-api]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: atlas-api
          image: ghcr.io/seltriva/atlas-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '1000m'
              memory: '1Gi'
          readinessProbe:
            httpGet:
              path: /api/v1/ops/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/ops/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 5']

---
apiVersion: v1
kind: Service
metadata:
  name: atlas-api-service
  namespace: atlas-connect
  labels:
    app: atlas-api
spec:
  selector:
    app: atlas-api
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP
