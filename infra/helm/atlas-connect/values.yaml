global:
  imageRegistry: ghcr.io/seltriva
  imagePullPolicy: Always
  namespace: atlas-connect

api:
  enabled: true
  replicaCount: 3
  image:
    name: atlas-api
    tag: latest
  port: 3001
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  healthCheck:
    readinessPath: /api/v1/ops/ready
    livenessPath: /api/v1/ops/health

worker:
  enabled: true
  replicaCount: 2
  image:
    name: atlas-worker
    tag: latest
  concurrency: 4
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 6

web:
  enabled: true
  replicaCount: 2
  image:
    name: atlas-web
    tag: latest
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7.2-alpine
  maxmemory: 512mb
  storage:
    size: 10Gi

postgres:
  enabled: true
  image: postgres:16-alpine
  database: atlas_connect
  storage:
    size: 100Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    api: api.atlas-connect.io
    web: app.atlas-connect.io
  tls:
    enabled: true
    secretName: atlas-tls

metrics:
  enabled: true
  scrapeInterval: 30s

tracing:
  enabled: true
  endpoint: http://otel-collector:4318

featureFlags:
  cacheTtlSeconds: 30

circuitBreaker:
  timeoutMs: 30000
  failureThreshold: 5
  successThreshold: 2

slo:
  availabilityTarget: 99.9
  latencyP95TargetMs: 300
  errorRateMax: 0.001
