{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "atlas-connect.fullname" . }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "atlas-connect.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: atlas-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: atlas-api
        {{- include "atlas-connect.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: {{ .Values.metrics.enabled | quote }}
        prometheus.io/port: {{ .Values.api.port | quote }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: atlas-api
          image: {{ printf "%s/%s:%s" .Values.global.imageRegistry .Values.api.image.name .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.readinessPath }}
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.livenessPath }}
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
{{- end }}
